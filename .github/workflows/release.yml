name: Release & Deploy preprod

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm run build:css

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp -r public dist/www
          cp -r src dist/src
          cp .ovhconfig dist/.ovhconfig

      - name: Zip dist
        run: cd dist && zip -r ../dist.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist.zip
          generate_release_notes: true

  deploy-preprod:
    needs: release
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - name: Download release asset
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "dist.zip" --repo ${{ github.repository }}
          unzip dist.zip -d dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy via FTP
        run: |
          lftp -c "
            open -u '${{ vars.FTP_USER }},${{ secrets.FTP_PASSWORD }}' \
                 ftp://${{ vars.FTP_HOST }}:${{ vars.FTP_PORT }}
            mirror --reverse --verbose dist/ /
          "

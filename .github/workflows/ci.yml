name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: PHP lint
        run: find src public -name '*.php' | xargs -P4 php -l | grep -v 'No syntax errors' || true

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build:css
